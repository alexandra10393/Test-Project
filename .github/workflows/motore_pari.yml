name: Motore A (Pari)

on:
  schedule:
    # Ore UTC: 7-23 (08:00-24:00 IT) e 0-0 (01:00 IT)
    # Copre fino all'1:50 UTC (2:50 IT), poi si ferma fino alle 8:00 IT
    - cron: '0,10,20,30,40,50 7-23,0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - run: |
        pip install requests playwright
        playwright install chromium
    - env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OCR_KEY: ${{ secrets.OCR_KEY }}
      run: python main.py
    - uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "Motore A: Aggiornamento"
        file_pattern: history.txt
