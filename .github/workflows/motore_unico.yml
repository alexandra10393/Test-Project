name: Motore Unico (All-in-One)

on:
  schedule:
    # Esegue ogni 10 minuti (es. 00, 10, 20...)
    # Dalle 6 di mattina alle 23 di sera (UTC), copre la giornata italiana
    - cron: '*/10 6-23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    # Controllo Orario Extra-Sicuro (Italia)
    - name: Check Orario Italiano (08:00 - 02:00)
      id: check-time
      run: |
        # Ottieni l'ora attuale a Roma
        hour=$(TZ="Europe/Rome" date +%H)
        echo "Ora italiana: $hour"
        
        # Logica: Esegui se l'ora è >= 08 OPPURE < 02
        if [ "$hour" -ge 8 ] || [ "$hour" -lt 2 ]; then
          echo "✅ Orario operativo. Procedo."
          echo "run_bot=true" >> $GITHUB_OUTPUT
        else
          echo "💤 Orario notturno (02:00-08:00). Bot a nanna."
          echo "run_bot=false" >> $GITHUB_OUTPUT
        fi

    - uses: actions/setup-python@v4
      if: steps.check-time.outputs.run_bot == 'true'
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Installazione Dipendenze
      if: steps.check-time.outputs.run_bot == 'true'
      run: |
        pip install -r requirements.txt
        playwright install chromium

    - name: Esecuzione Bot
      if: steps.check-time.outputs.run_bot == 'true'
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OCR_KEY: ${{ secrets.OCR_KEY }}
        IG_USER: ${{ secrets.IG_USER }}
        KEYWORD_1: ${{ secrets.KEYWORD_1 }}
        KEYWORD_2: ${{ secrets.KEYWORD_2 }}
        KEYWORD_3: ${{ secrets.KEYWORD_3 }}
      run: python main.py

    - name: Upload Screenshot Errore (Se fallisce)
      if: failure() && steps.check-time.outputs.run_bot == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: debug-screenshot
        path: error_screenshot.png
        retention-days: 1

    - uses: stefanzweifel/git-auto-commit-action@v4
      if: steps.check-time.outputs.run_bot == 'true'
      with:
        commit_message: "Bot: Aggiornamento history"
        file_pattern: history.txt
