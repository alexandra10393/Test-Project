name: Motore Unico (All-in-One)

on:
  schedule:
    - cron: '*/10 6-23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Check Orario Italiano (08:00 - 02:00)
      id: check-time
      run: |
        hour=$(TZ="Europe/Rome" date +%H)
        echo "Ora italiana: $hour"
        
        if [ "$hour" -ge 8 ] || [ "$hour" -lt 2 ]; then
          echo "✅ Orario operativo. Procedo."
          echo "run_bot=true" >> $GITHUB_OUTPUT
        else
          echo "💤 Orario notturno (02:00-08:00). Bot a nanna."
          echo "run_bot=false" >> $GITHUB_OUTPUT
        fi

    - uses: actions/setup-python@v4
      if: steps.check-time.outputs.run_bot == 'true'
      with:
        python-version: '3.9'
        cache: 'pip'

    # 🔥 CACHE PLAYWRIGHT OTTIMIZZATA 
    - name: Cache Playwright browsers
      if: steps.check-time.outputs.run_bot == 'true'
      uses: actions/cache@v3
      id: playwright-cache
      with:
        path: |
          ~/.cache/ms-playwright
          /opt/hostedtoolcache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Installazione Dipendenze
      if: steps.check-time.outputs.run_bot == 'true'
      run: |
        pip install -r requirements.txt
        # Installa Playwright anche se in cache (per sicurezza)
        pip install playwright==1.40.0

    - name: Installazione Browser Chromium
      if: steps.check-time.outputs.run_bot == 'true'
      run: |
        echo "📦 Installazione/verifica Chromium..."
        # Forza installazione Chromium
        python -m playwright install chromium --with-deps
        echo "✅ Chromium installato"
        
        # Verifica che esista
        if [ -f ~/.cache/ms-playwright/chromium-*/chrome-linux/chrome ]; then
          echo "✅ Chromium trovato nel cache"
        else
          echo "❌ Chromium non trovato, reinstallazione..."
          python -m playwright install --force chromium
        fi

    - name: Verifica Playwright
      if: steps.check-time.outputs.run_bot == 'true'
      run: |
        echo "🔍 Verifica installazione Playwright..."
        python -c "import playwright; print(f'✅ Playwright versione: {playwright.__version__}')"
        
        # Verifica che chromium sia installato
        python -c "
        from playwright.sync_api import sync_playwright
        p = sync_playwright().start()
        try:
            browser = p.chromium.launch(headless=True, timeout=5000)
            print('✅ Chromium funziona correttamente')
            browser.close()
        except Exception as e:
            print(f'❌ Errore Chromium: {e}')
        finally:
            p.stop()
        "

    - name: Esecuzione Bot
      if: steps.check-time.outputs.run_bot == 'true'
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OCR_KEY: ${{ secrets.OCR_KEY }}
        IG_USER: ${{ secrets.IG_USER }}
        KEYWORD_1: ${{ secrets.KEYWORD_1 }}
        KEYWORD_2: ${{ secrets.KEYWORD_2 }}
        KEYWORD_3: ${{ secrets.KEYWORD_3 }}
      run: python main.py

    - name: 📱 Aggiorna log telefono
      if: always()
      run: |
        echo "=== ULTIMO RUN ===" >> log_telefono.txt
        date "+%d/%m/%Y %H:%M:%S" >> log_telefono.txt
        echo "=================" >> log_telefono.txt
        echo "" >> log_telefono.txt
        
        # Mostra le ultime 10 righe del log per debugging
        echo "📱 ULTIME RIGHE LOG TELEFONO:"
        tail -10 log_telefono.txt || echo "File non esistente"

    - name: Upload Debug Files
      if: always() && steps.check-time.outputs.run_bot == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: bot-debug-files
        path: |
          *.html
          *.png
          iqsaved_debug_*.html
          playwright_logs.txt
        retention-days: 1

    - name: Upload Logs in caso di errore
      if: failure() && steps.check-time.outputs.run_bot == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: bot-error-logs
        path: |
          *.log
          *.json
          *.txt
          requirements.txt
        retention-days: 2

    - uses: stefanzweifel/git-auto-commit-action@v4
      if: steps.check-time.outputs.run_bot == 'true'
      with:
        commit_message: "Bot: Aggiornamento history"
        file_pattern: history.txt
