name: Motore Unico (All-in-One)

on:
  schedule:
    - cron: '*/10 6-23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Check Orario Italiano (08:00 - 02:00)
      id: check-time
      run: |
        hour=$(TZ="Europe/Rome" date +%H)
        echo "Ora italiana: $hour"
        
        if [ "$hour" -ge 8 ] || [ "$hour" -lt 2 ]; then
          echo "✅ Orario operativo. Procedo."
          echo "run_bot=true" >> $GITHUB_OUTPUT
        else
          echo "💤 Orario notturno (02:00-08:00). Bot a nanna."
          echo "run_bot=false" >> $GITHUB_OUTPUT
        fi

    - uses: actions/setup-python@v4
      if: steps.check-time.outputs.run_bot == 'true'
      with:
        python-version: '3.9'
        cache: 'pip'

    # 🔥 CACHE PLAYWRIGHT CRITICA 
    - name: Cache Playwright browsers
      if: steps.check-time.outputs.run_bot == 'true'
      uses: actions/cache@v3
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Installazione Dipendenze
      if: steps.check-time.outputs.run_bot == 'true'
      run: |
        pip install -r requirements.txt
        # Installa solo se non in cache
        if [ ! -d ~/.cache/ms-playwright/chromium-* ]; then
          echo "📦 Download Playwright chromium (circa 200MB)..."
          playwright install chromium
          echo "✅ Playwright installato"
        else
          echo "✅ Playwright già in cache, salto installazione"
        fi

    - name: Esecuzione Bot
      if: steps.check-time.outputs.run_bot == 'true'
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OCR_KEY: ${{ secrets.OCR_KEY }}
        IG_USER: ${{ secrets.IG_USER }}
        KEYWORD_1: ${{ secrets.KEYWORD_1 }}
        KEYWORD_2: ${{ secrets.KEYWORD_2 }}
        KEYWORD_3: ${{ secrets.KEYWORD_3 }}
      run: python main.py

    - name: Upload Logs in caso di errore
      if: failure() && steps.check-time.outputs.run_bot == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: bot-error-logs
        path: |
          *.log
          *.json
          *.txt
        retention-days: 2

    - uses: stefanzweifel/git-auto-commit-action@v4
      if: steps.check-time.outputs.run_bot == 'true'
      with:
        commit_message: "Bot: Aggiornamento history"
        file_pattern: history.txt
