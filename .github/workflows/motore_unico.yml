name: Motore Unico (All-in-One)

on:
  schedule:
    - cron: '*/10 6-23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Check Orario Italiano (08:00 - 02:00)
      id: check-time
      # ... (keep your existing time check logic)

    - uses: actions/setup-python@v4
      if: steps.check-time.outputs.run_bot == 'true'
      with:
        python-version: '3.9'
        cache: 'pip'

    # 🔧 Updated: Install Python dependencies
    - name: Install Python and Playwright Dependencies
      if: steps.check-time.outputs.run_bot == 'true'
      run: |
        pip install -r requirements.txt
        # Install Playwright system dependencies (Ubuntu 24.04 compatible)
        sudo apt-get update
        sudo apt-get install -y libnss3 libatk-bridge2.0-0t64 libxss1 libasound2t64 libgbm1 libgtk-3-0t64 libxshmfence-dev libxrandr2 libxcomposite1 libxcursor1 libxdamage1 libxi6
        # Install Playwright browsers
        playwright install chromium

    - name: Esecuzione Bot
      if: steps.check-time.outputs.run_bot == 'true'
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OCR_KEY: ${{ secrets.OCR_KEY }}
        IG_USER: ${{ secrets.IG_USER }}
        KEYWORD_1: ${{ secrets.KEYWORD_1 }}
        KEYWORD_2: ${{ secrets.KEYWORD_2 }}
        KEYWORD_3: ${{ secrets.KEYWORD_3 }}
      run: python main.py

    - name: 📱 Aggiorna log telefono
      if: always()
      run: |
        echo "=== ULTIMO RUN ===" >> log_telefono.txt
        date "+%d/%m/%Y %H:%M:%S" >> log_telefono.txt
        echo "=================" >> log_telefono.txt
        echo "" >> log_telefono.txt
        
        # Mostra le ultime 10 righe del log per debugging
        echo "📱 ULTIME RIGHE LOG TELEFONO:"
        tail -10 log_telefono.txt || echo "File non esistente"

    - name: Upload Debug Files
      if: always() && steps.check-time.outputs.run_bot == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: bot-debug-files
        path: |
          *.html
          *.png
          iqsaved_debug_*.html
          playwright_logs.txt
        retention-days: 1

    - name: Upload Logs in caso di errore
      if: failure() && steps.check-time.outputs.run_bot == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: bot-error-logs
        path: |
          *.log
          *.json
          *.txt
          requirements.txt
        retention-days: 2

    - uses: stefanzweifel/git-auto-commit-action@v4
      if: steps.check-time.outputs.run_bot == 'true'
      with:
        commit_message: "Bot: Aggiornamento history"
        file_pattern: history.txt
